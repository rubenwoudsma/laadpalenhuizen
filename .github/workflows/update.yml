name: Update charging point data

on:
  schedule:
    # Run at 06:00 UTC daily — NDW publishes overnight, fresh by morning NL time
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit huizen-data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run preprocessor
        run: python3 process.py

      - name: Check if data changed
        id: diff
        run: |
          if git diff --quiet huizen-data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change in data, skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add huizen-data.json
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: NDW update ${TIMESTAMP}"
          git push
        # Cloudflare Pages watches this branch and auto-deploys on push.
        # No separate deploy step needed once Pages is connected to the repo.

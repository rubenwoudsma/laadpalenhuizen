name: Update charging point data

on:
  schedule:
    # Run daily at 06:00 UTC. In the Netherlands this is 07:00 or 08:00 local time depending on DST.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-charging-point-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run preprocessor
        run: python3 process.py

      - name: Check if data changed
        id: diff
        run: |
          if git diff --quiet huizen-data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change in data, skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add huizen-data.json
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: NDW update ${TIMESTAMP}"
          git push
